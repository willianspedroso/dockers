version: '3.0'

services:
  php56_v1:
    image: willianspedroso/php56:v1
    container_name: php56_dev_v1
    restart: unless-stopped
    volumes:
      - /home/www/dockers/php5.6_mysql_20.04/etc/apache2/apache2.conf:/etc/apache2/apache2.conf
      - /home/www/dockers/php5.6_mysql_20.04/etc/apache2/sites-enabled:/etc/apache2/sites-enabled
      - /home/www/dockers/php5.6_mysql_20.04/etc/php/5.6/apache2/php.ini:/etc/php/5.6/apache2/php.ini
      - /home/www/dockers/php5.6_mysql_20.04/etc/php/5.6/cli/php.ini:/etc/php/5.6/cli/php.ini      
      - /home/www/dockers/php5.6_mysql_20.04/etc/rsyslog.d:/etc/rsyslog.d
      - /home/www/dockers/php5.6_mysql_20.04/etc/resolv/resolv.conf:/etc/resolv.conf
      - /home/www/factorysys/:/var/www/html/
      # Se o host for linux descomente essa linha para usar o localtime do host
      #- /etc/localtime:/etc/localtime:ro
    ports:
      - "8099:80"
